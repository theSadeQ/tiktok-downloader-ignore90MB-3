name: TikTok Bulk Download & Upload Split Archives to Release

on:
  push:
    branches:
      - "**"

concurrency:
  group: tiktok-download-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tiktok-download:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y ffmpeg zip python3-pip

          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade yt-dlp curl_cffi

          echo "yt-dlp version:"
          yt-dlp --version

      - name: Download files, split into 950MB archives, upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIKTOK_COOKIES_B64: ${{ secrets.TIKTOK_COOKIES_B64 }}
        run: |
          set +e
          set +u
          set -o pipefail

          BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"

          MAX_VIDEO_SIZE_BYTES=$((90 * 1024 * 1024))
          MAX_ARCHIVE_GROUP_BYTES=$((950 * 1024 * 1024))

          DOWNLOAD_DIR="downloads"
          TMP_DIR="tmp_downloads"
          REPORT_DIR="reports"
          ARCHIVE_DIR="release_archives"

          FAILED_URLS_FILE="$REPORT_DIR/failed_urls.txt"
          FAILED_RELEASES_FILE="$REPORT_DIR/failed_releases.txt"
          DEBUG_LOG="$REPORT_DIR/debug.log"

          mkdir -p "$DOWNLOAD_DIR" "$TMP_DIR" "$REPORT_DIR" "$ARCHIVE_DIR"
          touch downloaded_archive.txt
          touch "$FAILED_URLS_FILE" "$FAILED_RELEASES_FILE" "$DEBUG_LOG"

          log() {
            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] $*" | tee -a "$DEBUG_LOG"
          }

          log "Workflow started"
          log "Current branch: $BRANCH"
          log "Archive group limit: $MAX_ARCHIVE_GROUP_BYTES bytes (~950MB)"

          MSG_FILE="$(mktemp)"
          git log -1 --pretty=%B > "$MSG_FILE" 2>>"$DEBUG_LOG"

          COMMAND="$(
            grep -Eim1 '^[[:space:]]*(tiktok-zip|download-zip|tiktok-download|download):' "$MSG_FILE" \
              | sed -E 's/^[[:space:]]*([^:]+):.*/\1/I' \
              | tr '[:upper:]' '[:lower:]' || true
          )"

          if [ -z "$COMMAND" ]; then
            log "No supported download command found."
            exit 0
          fi

          URLS="$(
            awk '
              BEGIN { capture = 0 }

              /^[[:space:]]*(tiktok-zip|download-zip|tiktok-download|download):[[:space:]]*/ && capture == 0 {
                capture = 1
                line = $0
                sub(/^[[:space:]]*(tiktok-zip|download-zip|tiktok-download|download):[[:space:]]*/, "", line)
                print line
                next
              }

              capture == 1 {
                print $0
              }
            ' "$MSG_FILE" \
              | grep -Eo 'https?://[^[:space:]<>"]+' \
              | sed 's/[),.;]*$//' \
              | sort -u || true
          )"

          if [ -z "$URLS" ]; then
            log "No URLs found after '$COMMAND:'."
            exit 0
          fi

          COOKIES_ARGS=()
          if [ -n "${TIKTOK_COOKIES_B64:-}" ]; then
            log "Using TikTok cookies from secret."
            echo "$TIKTOK_COOKIES_B64" | base64 -d > cookies.txt 2>>"$DEBUG_LOG"
            chmod 600 cookies.txt
            COOKIES_ARGS=(--cookies cookies.txt)
          else
            log "No cookies secret provided. Trying public access."
          fi

          remove_oversized_videos() {
            target_dir="$1"

            [ -d "$target_dir" ] || return 0

            find "$target_dir" -type f \( \
              -iname "*.mp4" -o \
              -iname "*.mov" -o \
              -iname "*.mkv" -o \
              -iname "*.webm" \
            \) -size +90M -print0 2>>"$DEBUG_LOG" | while IFS= read -r -d '' file; do
              size_bytes="$(stat -c%s "$file" 2>>"$DEBUG_LOG")"
              log "Removing oversized video: $file (${size_bytes:-unknown} bytes)"
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | Oversized file removed | $file | ${size_bytes:-unknown} bytes" >> "$FAILED_URLS_FILE"
              rm -f -- "$file" 2>>"$DEBUG_LOG"
            done
          }

          PROCESSED_URLS=0
          SUCCESSFUL_URLS=0
          FAILED_URLS=0

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            PROCESSED_URLS=$((PROCESSED_URLS + 1))

            log "Processing URL #$PROCESSED_URLS: $URL"

            BEFORE_TMP_COUNT="$(find "$TMP_DIR" -type f | wc -l)"

            yt-dlp \
              --ignore-errors \
              --no-abort-on-error \
              --no-mtime \
              --download-archive downloaded_archive.txt \
              --max-filesize 90M \
              --format "bv*+ba/b" \
              --merge-output-format mp4 \
              "${COOKIES_ARGS[@]}" \
              --paths "$TMP_DIR" \
              -o "%(uploader|unknown_uploader)s/@%(uploader|unknown_uploader)s_%(upload_date>%Y-%m-%d|unknown_date)s_%(title).80B_%(id)s.%(ext)s" \
              "$URL" >>"$DEBUG_LOG" 2>&1

            AFTER_TMP_COUNT="$(find "$TMP_DIR" -type f | wc -l)"

            remove_oversized_videos "$TMP_DIR"

            AFTER_CLEAN_COUNT="$(find "$TMP_DIR" -type f | wc -l)"

            if [ "$AFTER_CLEAN_COUNT" -gt "$BEFORE_TMP_COUNT" ]; then
              log "Copying new files to $DOWNLOAD_DIR"
              cp -a "$TMP_DIR"/. "$DOWNLOAD_DIR"/ >>"$DEBUG_LOG" 2>&1
              find "$TMP_DIR" -mindepth 1 -delete >>"$DEBUG_LOG" 2>&1
              SUCCESSFUL_URLS=$((SUCCESSFUL_URLS + 1))
            else
              log "No new downloadable file for URL: $URL"
              FAILED_URLS=$((FAILED_URLS + 1))
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | No new file or failed download | $URL" >> "$FAILED_URLS_FILE"
              find "$TMP_DIR" -mindepth 1 -delete >>"$DEBUG_LOG" 2>&1
            fi
          done <<< "$URLS"

          log "Grouping files into <=950MB archives"

          mapfile -d '' FILES < <(find "$DOWNLOAD_DIR" -type f -print0 | sort -z)

          create_archive() {
            batch_list_file="$1"
            part_num="$2"

            [ -s "$batch_list_file" ] || return 0

            archive_name="tiktok_downloads_${BRANCH}_part_${part_num}.zip"
            archive_path="$ARCHIVE_DIR/$archive_name"

            log "Creating archive part $part_num: $archive_name"

            (
              cd "$DOWNLOAD_DIR" || exit 1
              zip -r -q "$GITHUB_WORKSPACE/$archive_path" -@ < "$batch_list_file"
            )
            ZIP_EXIT=$?

            if [ "$ZIP_EXIT" -ne 0 ]; then
              log "zip failed for $archive_name"
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | zip failed | $archive_name" >> "$FAILED_RELEASES_FILE"
              return 0
            fi

            archive_size="$(stat -c%s "$archive_path" 2>>"$DEBUG_LOG")"
            log "Archive created: $archive_name (${archive_size:-unknown} bytes)"

            if [ "${archive_size:-0}" -gt "$MAX_ARCHIVE_GROUP_BYTES" ]; then
              log "Warning: archive exceeds 950MB target: $archive_name"
            fi

            return 0
          }

          if [ "${#FILES[@]}" -eq 0 ]; then
            log "No files downloaded, no archives to create."
          else
            PART_NUM=1
            CURRENT_SIZE=0
            CURRENT_LIST="$(mktemp)"

            for abs_file in "${FILES[@]}"; do
              rel_file="${abs_file#"$DOWNLOAD_DIR"/}"
              file_size="$(stat -c%s "$abs_file" 2>>"$DEBUG_LOG")"
              [ -z "$file_size" ] && file_size=0

              if [ "$CURRENT_SIZE" -gt 0 ] && [ $((CURRENT_SIZE + file_size)) -gt "$MAX_ARCHIVE_GROUP_BYTES" ]; then
                create_archive "$CURRENT_LIST" "$PART_NUM"
                PART_NUM=$((PART_NUM + 1))
                : > "$CURRENT_LIST"
                CURRENT_SIZE=0
              fi

              printf '%s\n' "$rel_file" >> "$CURRENT_LIST"
              CURRENT_SIZE=$((CURRENT_SIZE + file_size))
            done

            create_archive "$CURRENT_LIST" "$PART_NUM"
            rm -f "$CURRENT_LIST"
          fi

          RELEASE_TAG="tiktok-downloads-${BRANCH}"
          RELEASE_NAME="TikTok Downloads (${BRANCH})"

          log "Ensuring release exists: $RELEASE_TAG"

          gh release view "$RELEASE_TAG" >>"$DEBUG_LOG" 2>&1
          if [ $? -ne 0 ]; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --notes "Automated TikTok download split archives for branch: $BRANCH" \
              >>"$DEBUG_LOG" 2>&1

            if [ $? -ne 0 ]; then
              log "Failed to create release: $RELEASE_TAG"
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | release create failed | $RELEASE_TAG" >> "$FAILED_RELEASES_FILE"
            else
              log "Release created: $RELEASE_TAG"
            fi
          else
            log "Release already exists: $RELEASE_TAG"
          fi

          if compgen -G "$ARCHIVE_DIR/*.zip" > /dev/null; then
            for archive in "$ARCHIVE_DIR"/*.zip; do
              [ -f "$archive" ] || continue
              log "Uploading archive: $archive"
              gh release upload "$RELEASE_TAG" "$archive" --clobber >>"$DEBUG_LOG" 2>&1
              if [ $? -ne 0 ]; then
                log "Failed to upload: $archive"
                echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | upload failed | $archive" >> "$FAILED_RELEASES_FILE"
              else
                log "Uploaded successfully: $archive"
              fi
            done
          else
            log "No archives found to upload."
          fi

          log "Summary:"
          log "Processed URLs: $PROCESSED_URLS"
          log "Successful URLs: $SUCCESSFUL_URLS"
          log "Failed URLs: $FAILED_URLS"

          exit 0
