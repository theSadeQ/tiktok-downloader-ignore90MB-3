name: TikTok Bulk Download & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip findutils
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir --upgrade yt-dlp "curl_cffi[requests]"

      - name: Extract URLs and download TikTok files
        shell: bash
        run: |
          set -u

          MSG="$(git log -1 --pretty=%B)"
          echo "Commit message:"
          echo "$MSG"

          if echo "$MSG" | grep -qP 'tiktok-zip:'; then
            MODE="zip"
            URL_LINE="$(echo "$MSG" | grep -oP 'tiktok-zip:\s*\K.*')"
            echo "Detected tiktok-zip mode."
          elif echo "$MSG" | grep -qP 'tiktok-download:'; then
            MODE="normal"
            URL_LINE="$(echo "$MSG" | grep -oP 'tiktok-download:\s*\K.*')"
            echo "Detected tiktok-download mode."
          else
            echo "No supported command found in commit message."
            exit 1
          fi

          mkdir -p downloads tmp_downloads

          YTDLP_HAS_ERRORS=0

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            echo "Downloading: $URL"

            yt-dlp \
              --ignore-errors \
              --no-playlist \
              --restrict-filenames \
              --no-overwrites \
              --retries 5 \
              --fragment-retries 5 \
              --sleep-requests 2 \
              --sleep-interval 3 \
              --max-sleep-interval 8 \
              --download-archive downloaded_archive.txt \
              --merge-output-format mp4 \
              -o 'tmp_downloads/%(uploader|unknown_uploader)s/%(title|video)s-%(id)s.%(ext)s' \
              "$URL"

            STATUS=$?
            if [ "$STATUS" -ne 0 ]; then
              echo "Warning: yt-dlp failed for $URL with exit code $STATUS"
              YTDLP_HAS_ERRORS=1
            fi
          done <<< "$URL_LINE"

          MEDIA_COUNT="$(find tmp_downloads -type f | wc -l)"
          if [ "$MEDIA_COUNT" -eq 0 ]; then
            echo "No files were downloaded."
            exit 1
          fi

          echo "Downloaded file count: $MEDIA_COUNT"

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tiktok_bulk_$(date +%Y%m%d_%H%M%S)"
            ARCHIVE_PATH="downloads/${ARCHIVE_NAME}.zip"

            echo "Creating archive: $ARCHIVE_PATH"
            (
              cd tmp_downloads
              zip -r "../$ARCHIVE_PATH" .
            )

            SIZE=$(stat -c%s "$ARCHIVE_PATH")
            LIMIT=$((90 * 1024 * 1024))

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Archive exceeds 90MB, recreating as split archive..."

              rm -f "$ARCHIVE_PATH"
              (
                cd tmp_downloads
                zip -r -s 90m "../$ARCHIVE_PATH" .
              )

              echo "Split archive parts:"
              ls -lh downloads/"${ARCHIVE_NAME}"*
            else
              echo "Archive is within 90MB."
            fi
          else
            echo "Moving downloaded content into downloads/"
            cp -R tmp_downloads/. downloads/
          fi

          rm -rf tmp_downloads

          if [ "$YTDLP_HAS_ERRORS" -eq 1 ]; then
            echo "Some downloads failed, but workflow will continue with successful files."
          fi

      - name: Split oversized non-zip files over 90MB
        shell: bash
        run: |
          set -euxo pipefail

          find downloads -type f ! -name '*.zip' ! -name '*.z[0-9
