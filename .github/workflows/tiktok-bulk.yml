name: TikTok Bulk Download & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  tiktok-download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip python3
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir --upgrade yt-dlp "curl_cffi[requests]"

      - name: Extract URLs and download TikTok files
        shell: bash
        run: |
          set -u
          set -o pipefail

          mkdir -p downloads tmp_downloads
          touch downloaded_archive.txt

          echo "Reading commit message and extracting TikTok URLs..."

          python3 <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          msg = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%B"],
              text=True,
              errors="replace"
          )

          print("Commit message:")
          print(msg)

          commands = [
              ("zip", r"(?is)(?:^|\n)\s*tiktok-zip\s*:\s*(.*)"),
              ("normal", r"(?is)(?:^|\n)\s*tiktok-download\s*:\s*(.*)"),
          ]

          mode = None
          block = ""

          for candidate_mode, pattern in commands:
              match = re.search(pattern, msg)
              if match:
                  mode = candidate_mode
                  block = match.group(1)
                  break

          if mode is None:
              print("No tiktok-download: or tiktok-zip: command found. Nothing to do.")
              Path("NO_COMMAND").write_text("1")
              sys.exit(0)

          urls = re.findall(r"https?://[^\s<>'\"]+", block)

          cleaned_urls = []
          for url in urls:
              url = url.rstrip(".,);]")
              if "tiktok.com" in url or "vm.tiktok.com" in url or "vt.tiktok.com" in url:
                  cleaned_urls.append(url)

          if not cleaned_urls
