name: TikTok Bulk Downloader

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
  group: tiktok-bulk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  download_tiktok_bulk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read latest commit message
        id: commit_msg
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "message<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stop if commit does not request TikTok bulk download
        shell: bash
        run: |
          set -euo pipefail
          MSG="${{ steps.commit_msg.outputs.message }}"
          if ! printf '%s\n' "$MSG" | grep -qE '(^|[[:space:]])tiktok-bulk:[[:space:]]+'; then
            echo "No 'tiktok-bulk:' command found in commit message. Exiting successfully."
            exit 0
          fi

      - name: Extract TikTok URLs from commit message
        shell: bash
        run: |
          set -euo pipefail

          MSG="${{ steps.commit_msg.outputs.message }}"

          # Extract everything after "tiktok-bulk:"
          URL_BLOCK="$(printf '%s\n' "$MSG" | perl -0ne 'if (/tiktok-bulk:\s*(.+)/s) { print $1 }')"

          if [ -z "${URL_BLOCK:-}" ]; then
            echo "ERROR: No URLs found after 'tiktok-bulk:'."
            exit 1
          fi

          # Extract only TikTok URLs
          printf '%s\n' "$URL_BLOCK" \
            | grep -Eo 'https://([A-Za-z0-9-]+\.)?(tiktok\.com|vm\.tiktok\.com)/[^[:space:]]+' \
            | sed 's/[),.;]*$//' \
            | sort -u > tiktok_urls.txt

          if [ ! -s tiktok_urls.txt ]; then
            echo "ERROR: No valid TikTok URLs found in commit message."
            echo "Example format:"
            echo '  tiktok-bulk: https://www.tiktok.com/@user/video/1 https://vm.tiktok.com/abc/'
            exit 1
          fi

          echo "TikTok URLs found:"
          cat tiktok_urls.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            zip \
            unzip \
            ffmpeg \
            ca-certificates

          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir yt-dlp

      - name: Download TikTok videos with yt-dlp
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p tmp_downloads downloads

          yt-dlp \
            --ignore-errors \
            --no-playlist \
            --restrict-filenames \
            --no-overwrites \
            -a tiktok_urls.txt \
            -o "tmp_downloads/%(uploader|unknown_uploader)s/%(title|video)s-%(id)s.%(ext)s"

          if ! find tmp_downloads -type f | grep -q .; then
            echo "ERROR: No files were downloaded."
            exit 1
          fi

      - name: Process downloads and split files over 90MB
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p downloads

          find tmp_downloads -type f | while IFS= read -r FILE; do
            [ -f "$FILE" ] || continue

            SIZE_BYTES="$(stat -c%s "$FILE")"
            BASENAME="$(basename "$FILE")"
            NAME_NO_EXT="${BASENAME%.*}"

            if [ "$SIZE_BYTES" -gt 94371840 ]; then
              echo "File exceeds 90MB, creating split zip: $BASENAME"
              zip -s 90m "downloads/${NAME_NO_EXT}.zip" -j "$FILE"
            else
              echo "Copying file under 90MB: $BASENAME"
              cp -f "$FILE" "downloads/$BASENAME"
            fi
          done

          if ! find downloads -type f | grep -q .; then
            echo "ERROR: No output files were produced in downloads/."
            exit 1
          fi

          echo "Final downloads directory:"
          find downloads -maxdepth 2 -type f | sort

      - name: Commit and push results
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF#refs/heads/}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add TikTok bulk downloads [skip ci]"
          git push origin "HEAD:${BRANCH}"
