name: Scrape TikTok URLs

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Extract URL from commit message
        id: extract_url
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          URL=$(echo "$COMMIT_MSG" | grep -oE 'https?://[^ ]+' | head -n 1 | sed 's/[.,;:!?]$//')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run Scraper
        if: steps.extract_url.outputs.url != ''
        run: |
          python scripts/scrape_tiktok_urls.py "${{ steps.extract_url.outputs.url }}"

      - name: Commit and Push Results
        if: steps.extract_url.outputs.url != ''
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add everything in the downloads folder (text files, images, html)
          git add downloads/
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new URLs or changes to save."
          else
            git commit -m "Save TikTok scraped URLs and debug data [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
