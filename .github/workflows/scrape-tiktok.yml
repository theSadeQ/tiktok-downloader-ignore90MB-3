name: Scrape TikTok URLs via Mirror

on:
  push:
    branches:
      - main
      - master

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # CRITICAL: Prevent infinite loops by ignoring our bot's own commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Extract Urlebird URL from commit message
        id: extract_url
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          # Match the localized Urlebird URL format: https://urlebird.com/tw/user/USERNAME/
          URL=$(echo "$COMMIT_MSG" | grep -oP 'https://(?:www\.)?urlebird\.com/tw/user/[a-zA-Z0-9_.-]+/?' | head -n 1)
          
          if [ -z "$URL" ]; then
            echo "No Urlebird URL found in commit message. Skipping."
          else
            echo "Found URL: $URL"
          fi
          
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run Scraper
        if: steps.extract_url.outputs.url != ''
        run: |
          python scripts/scrape_tiktok_urls.py "${{ steps.extract_url.outputs.url }}"

      - name: Commit and Push results
        if: steps.extract_url.outputs.url != ''
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "No new URLs to commit."
          else
            git commit -m "chore: update scraped URLs for Urlebird profile [skip ci]"
            git pull --rebase origin HEAD
            git push
          fi
